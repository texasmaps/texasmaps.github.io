<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Texas County Maps — G4T</title>
<style>
  :root{--bg:#eef1f6;--panel:#fff;--ink:#161b26;--muted:#697084;--line:#e3e7ee;--accent:#0f5fa6;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg)}
  #shell{display:flex;flex-direction:column;height:100vh}
  header{background:var(--panel);border-bottom:1px solid var(--line);box-shadow:0 1px 3px rgba(20,27,38,.05);padding:10px 18px}
  .row1{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  h1{font-size:17px;margin:0;font-weight:700;letter-spacing:-.01em}
  .sub{font-size:12px;color:var(--muted)}
  nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  nav button{border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 15px;border-radius:999px;font-size:13.5px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .12s}
  nav button .dot{width:11px;height:11px;border-radius:3px;flex:none}
  nav button:hover{border-color:#b9c0cf;transform:translateY(-1px)}
  nav button.active{color:#fff;border-color:transparent;font-weight:600;box-shadow:0 2px 7px rgba(20,27,38,.2)}
  .frwrap{flex:1;position:relative;min-height:0;background:var(--bg)}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#fff}
  .loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;pointer-events:none;opacity:0;transition:opacity .15s}
  .loading.on{opacity:1}
</style>
</head>
<body>
<div id="shell">
  <header>
    <div class="row1">
      <h1>🗺 Texas County Maps</h1>
      <span class="sub">Five interactive maps · one workspace · 254 counties · shared 6-region framework</span>
    </div>
    <nav id="tabs"></nav>
  </header>
  <div class="frwrap">
    <iframe id="frame" title="map" src=""></iframe>
    <div class="loading" id="loading">Loading map…</div>
  </div>
</div>
<script>
  const MAPS=[
    {label:'Region Builder',   file:'tx_region_builder.html',              color:'#6366f1'},
    {label:'Race & Ethnicity', file:'texas_race_map.html',                 color:'#1f78b4'},
    {label:'Families & Households', file:'texas_families_households_map.html', color:'#2e8b57'},
    {label:'Rural-Urban & SES',file:'texas_rural_ses_map.html',            color:'#d94801'},
    {label:'Elections',        file:'texas_elections_map.html',            color:'#cb181d'}
  ];
  const tabs=document.getElementById('tabs');
  const frame=document.getElementById('frame');
  const loading=document.getElementById('loading');
  let current=-1;
  function show(i){
    if(i===current)return;current=i;
    document.querySelectorAll('#tabs button').forEach((b,j)=>{
      const on=j===i;b.classList.toggle('active',on);b.style.background=on?MAPS[j].color:'#fff';
    });
    loading.classList.add('on');
    frame.src=MAPS[i].file;
    // reflect selection in the URL hash so it can be shared/bookmarked
    history.replaceState(null,'','#'+encodeURIComponent(MAPS[i].file.replace('.html','')));
  }
  frame.addEventListener('load',()=>loading.classList.remove('on'));
  MAPS.forEach((m,i)=>{
    const b=document.createElement('button');
    b.innerHTML=`<span class="dot" style="background:${m.color}"></span>${m.label}`;
    b.onclick=()=>show(i);
    tabs.appendChild(b);
  });
  // open the tab named in the URL hash, else the first map
  const want=decodeURIComponent((location.hash||'').replace('#',''));
  const start=Math.max(0,MAPS.findIndex(m=>m.file.replace('.html','')===want));
  show(start);
</script>
</body>
</html>
