<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Texas Counties — Election Results</title>
<style>
  :root{--bg:#eef1f6;--panel:#fff;--ink:#161b26;--muted:#697084;--line:#e3e7ee;--rep:#cb181d;--dem:#2171b5;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg)}
  #app{display:flex;flex-direction:column;height:100vh}
  header{padding:13px 20px;border-bottom:1px solid var(--line);background:var(--panel);box-shadow:0 1px 3px rgba(20,27,38,.04)}
  .htop{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  h1{font-size:19px;margin:0;font-weight:700;letter-spacing:-.01em}
  .sub{font-size:12px;color:var(--muted)}
  .modes{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;align-items:center}
  .modes .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-right:2px}
  .modes button{border:1px solid var(--line);background:#fff;color:var(--ink);padding:7px 13px;border-radius:999px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .12s}
  .modes button .dot{width:11px;height:11px;border-radius:3px}
  .modes button:hover{border-color:#b9c0cf;transform:translateY(-1px)}
  .modes button.active{color:#fff;border-color:transparent;font-weight:600;box-shadow:0 2px 6px rgba(20,27,38,.18)}
  main{flex:1;display:flex;min-height:0}
  #mapwrap{flex:1;position:relative;min-width:0;background:radial-gradient(circle at 50% 30%,#f4f7fb,#e6eaf2)}
  svg#map{width:100%;height:100%;display:block;cursor:grab}
  svg#map:active{cursor:grabbing}
  .county{stroke:#fff;stroke-width:.5px;stroke-linejoin:round;transition:fill-opacity .12s}
  .county:hover{stroke:#0d1320;stroke-width:1.3px}
  .county.sel{stroke:#0d1320;stroke-width:2px}
  .regionline{fill:none;stroke:#0d1320;stroke-width:1.6px;pointer-events:none;opacity:.55}
  .cityDot{fill:#11151d;stroke:#fff;stroke-width:1.2px;pointer-events:none}
  .cityLbl{font-size:12px;font-weight:600;fill:#11151d;paint-order:stroke;stroke:#fff;stroke-width:3px;stroke-linejoin:round;pointer-events:none}
  aside{width:375px;border-left:1px solid var(--line);background:var(--panel);overflow-y:auto;padding:18px}
  .search{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:13px;margin-bottom:15px}
  h3.sec{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 9px}
  .legend{margin-bottom:15px;padding-bottom:14px;border-bottom:1px solid var(--line)}
  .lrow{display:flex;align-items:center;gap:9px;font-size:12.5px;margin:4px 0}
  .lsw{width:24px;height:14px;border-radius:3px;flex:none;border:1px solid rgba(0,0,0,.08)}
  .lrow .cnt{margin-left:auto;color:var(--muted);font-size:11px}
  .legdesc{font-size:11.5px;color:var(--muted);margin-top:9px;line-height:1.45}
  .cty{font-size:20px;font-weight:700;margin:2px 0 1px;letter-spacing:-.01em}
  .tot{font-size:12px;color:var(--muted);margin-bottom:10px}
  .pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;color:#fff;margin:0 6px 10px 0}
  .ccard{border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin:10px 0}
  .ccard .ct{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;font-weight:700;margin-bottom:8px}
  .wbadge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;color:#fff}
  .vbar{margin:6px 0}
  .vbar .top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
  .vbar .top b{font-weight:700}
  .track{height:13px;background:#eef0f4;border-radius:5px;overflow:hidden}
  .track>i{display:block;height:100%}
  .shiftline{font-size:12px;color:var(--muted);margin-top:8px}
  .shiftline b{color:var(--ink)}
  .hint{font-size:11.5px;color:var(--muted);line-height:1.5;margin-top:8px}
  .p26{background:#f7f9fc;border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:6px}
  .p26 .row{display:flex;justify-content:space-between;font-size:12.5px;margin:3px 0}
  .p26 .win{font-weight:700}
  footer{padding:7px 20px;border-top:1px solid var(--line);background:var(--panel);font-size:11px;color:var(--muted)}
  .zc{position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column;gap:5px}
  .zc button{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:17px;cursor:pointer}
  .zc button:hover{background:#f1f5f9}
  #tip{position:absolute;pointer-events:none;background:rgba(13,19,32,.92);color:#fff;font-size:12px;padding:6px 9px;border-radius:7px;opacity:0;transition:opacity .1s;z-index:9;white-space:nowrap}
  .reg-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-left:8px;cursor:pointer}

@media (max-width:760px){
  #app{height:auto;min-height:100vh}
  main{flex-direction:column;min-height:0}
  #mapwrap{flex:none;height:62vh;min-height:340px}
  aside{width:100%;border-left:none;border-top:1px solid var(--line);overflow:visible}
  header{padding:10px 12px}
  h1{font-size:15px;line-height:1.25}
  .sub{font-size:11px}
  .modes{margin-top:8px}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="htop">
      <h1>Texas Counties — Election Results</h1>
      <span class="sub">254 counties · choose a contest · click a county for full vote breakdown</span>
    </div>
    <div class="modes" id="modes"><span class="lbl">Contest</span></div>
  </header>
  <main>
    <div id="mapwrap">
      <svg id="map"></svg>
      <div class="zc"><button id="zin">+</button><button id="zout">−</button><button id="zrst" style="font-size:12px">⟲</button></div>
      <div id="tip"></div>
    </div>
    <aside>
      <input class="search" id="search" list="ctylist" placeholder="Search a county…">
      <datalist id="ctylist"></datalist>
      <div class="legend" id="legend"></div>
      <div id="detail"></div>
    </aside>
  </main>
  <footer id="foot"></footer>
</div>

<script>
const fmt=n=>n.toLocaleString('en-US');

// ---------- regions ----------
const REGIONS=[
  {id:1,name:'Central Texas / Austin',color:'#3b82f6'},
  {id:2,name:'Dallas / Collin / NE Texas',color:'#4a0404'},
  {id:3,name:'Houston / Gulf / East Texas',color:'#6287b5'},
  {id:4,name:'Fort Worth / Denton / Panhandle',color:'#c8a96a'},
  {id:5,name:'El Paso / Border / RGV',color:'#caa92f'},
  {id:6,name:'San Antonio / Corpus Christi',color:'#809351'}
];
const REGION_NAME={};REGIONS.forEach(R=>REGION_NAME[R.id]=R.name);

// ---------- color scales ----------
// margin: + = Republican, - = Democratic
function marginColor(m){
  if(m>=40)return '#840711'; if(m>=20)return '#bb1419'; if(m>=10)return '#e02c26';
  if(m>=5)return '#f1593f'; if(m>0)return '#f7a98f';
  if(m>-5)return '#a9cfe6'; if(m>-10)return '#5ba3d0'; if(m>-20)return '#2e7ebb';
  if(m>-40)return '#1660a8'; return '#0b3d82';
}
function shiftColor(s){ // + = moved Republican (red), - = moved Democratic (blue)
  if(s>=15)return '#840711'; if(s>=8)return '#cb181d'; if(s>=4)return '#f1593f'; if(s>=1)return '#f9b8a6';
  if(s>-1)return '#eef0f4';
  if(s>-4)return '#bcd6ea'; if(s>-8)return '#5ba3d0'; return '#1660a8';
}
// 2026 Dem primary: shade by Hinojosa's share; counties she lost get purple
function hinColor(d){const p=d.pr26;if(p.win!=='Hinojosa')return '#7b3fa0';
  const v=p.hin;if(v>=70)return '#08519c'; if(v>=60)return '#3182bd'; if(v>=50)return '#6baed6'; if(v>=40)return '#9ecae1'; return '#deebf7';}
// 2026 GOP primary: shade by Abbott's share (all Abbott wins)
function abbColor(d){const v=d.pr26.abb;if(v>=86)return '#a50f15'; if(v>=82)return '#de2d26'; if(v>=78)return '#fb6a4a'; return '#fcae91';}

const LAYERS={
  g22:{label:'2022 Governor', dot:'linear-gradient(90deg,#0b3d82,#eef0f4,#840711)', kind:'margin', key:'g22',
       rname:'Greg Abbott', dname:"Beto O'Rourke", title:'2022 Governor — Abbott (R) vs. O’Rourke (D)'},
  p24:{label:'2024 President', dot:'linear-gradient(90deg,#0b3d82,#eef0f4,#840711)', kind:'margin', key:'p24',
       rname:'Donald Trump', dname:'Kamala Harris', title:'2024 President — Trump (R) vs. Harris (D)'},
  shift:{label:'Shift ’22→’24', dot:'linear-gradient(90deg,#1660a8,#eef0f4,#840711)', kind:'shift',
       title:'Partisan shift: 2022 Governor → 2024 President'},
  pr26d:{label:'2026 Dem primary', dot:'linear-gradient(90deg,#deebf7,#3182bd,#08519c)', kind:'dem26',
       title:'2026 Democratic governor primary — Hinojosa’s county share'},
  pr26r:{label:'2026 GOP primary', dot:'linear-gradient(90deg,#fcae91,#de2d26,#a50f15)', kind:'rep26',
       title:'2026 Republican governor primary — Abbott’s county share'}
};
let mode='p24', showRegions=false;

// ranks for margin (most R = 1)
const N=Object.keys(EDATA).length;

function fillFor(f){const d=EDATA[f];if(!d)return '#dfe3ea';
  if(mode==='shift')return shiftColor(d.shift);
  if(mode==='pr26d')return hinColor(d);
  if(mode==='pr26r')return abbColor(d);
  return marginColor(d[LAYERS[mode].key].m);
}

// ---------- map ----------
const CITIES=[
  {n:'Houston',lon:-95.3698,lat:29.7604},{n:'San Antonio',lon:-98.4936,lat:29.4241},
  {n:'Dallas',lon:-96.7970,lat:32.7767},{n:'Fort Worth',lon:-97.3308,lat:32.7555},
  {n:'Austin',lon:-97.7431,lat:30.2672},{n:'El Paso',lon:-106.4850,lat:31.7619},
  {n:'Corpus Christi',lon:-97.3964,lat:27.8006},{n:'Lubbock',lon:-101.8552,lat:33.5779},
  {n:'Amarillo',lon:-101.8313,lat:35.2220},{n:'McAllen',lon:-98.2300,lat:26.2034}
];
const svg=d3.select('#map'),gMap=svg.append('g'),gCounty=gMap.append('g'),gRegion=gMap.append('g'),gCity=gMap.append('g');
const tip=document.getElementById('tip');
let path,features=[],selFips=null,zoom,projection,TOPO=null,OBJ=null;
const W=980,H=770;

function detectGeoid(props,id){
  if(props){
    if(props.GEOID)return String(props.GEOID).padStart(5,'0');
    if(props.STATE&&props.COUNTY)return String(props.STATE).padStart(2,'0')+String(props.COUNTY).padStart(3,'0');
    if(props.FIPS)return String(props.FIPS).padStart(5,'0');
    if(props.fips)return String(props.fips).padStart(5,'0');
  }
  if(id!=null)return String(id).padStart(5,'0');
  return null;
}
async function load(){
  const SRC=[
    {url:'https://cdn.jsdelivr.net/gh/deldersveld/topojson@master/countries/us-states/TX-48-texas-counties.json',type:'topo'},
    {url:'https://cdn.jsdelivr.net/gh/plotly/datasets@master/geojson-counties-fips.json',type:'geo'}
  ];
  let feats=null;
  for(const s of SRC){
    try{
      const res=await fetch(s.url);if(!res.ok)throw 0;const j=await res.json();
      if(s.type==='topo'){const k=Object.keys(j.objects)[0];feats=topojson.feature(j,j.objects[k]).features;TOPO=j;OBJ=k;}
      else feats=j.features;
      feats=feats.map(ft=>{const g=detectGeoid(ft.properties,ft.id);ft.geoid=g;ft.fips=g?g.slice(-3):null;return ft;})
                 .filter(ft=>ft.geoid&&ft.geoid.slice(0,2)==='48'&&EDATA[ft.fips]);
      if(feats.length>=240)break;
    }catch(e){feats=null;}
  }
  if(!feats||!feats.length){document.getElementById('mapwrap').insertAdjacentHTML('beforeend','<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#697084">Could not load county boundaries (needs internet).</div>');return;}
  features=feats;draw();
}
function draw(){
  projection=d3.geoAlbers().rotate([99,0]).center([0,31.3]).parallels([28,36]);
  projection.fitExtent([[18,18],[W-18,H-18]],{type:'FeatureCollection',features});
  path=d3.geoPath(projection);svg.attr('viewBox',`0 0 ${W} ${H}`);
  gCounty.selectAll('path.county').data(features,d=>d.fips).join('path')
    .attr('class','county').attr('d',path).attr('fill',d=>fillFor(d.fips))
    .on('mousemove',(e,d)=>showTip(e,d.fips)).on('mouseleave',()=>tip.style.opacity=0)
    .on('click',(e,d)=>select(d.fips));
  buildRegionMesh();
  gCity.selectAll('g.city').data(CITIES).join(enter=>{
    const g=enter.append('g').attr('class','city').attr('transform',d=>{const p=projection([d.lon,d.lat]);return `translate(${p[0]},${p[1]})`;});
    g.append('circle').attr('class','cityDot').attr('r',3.2);
    g.append('text').attr('class','cityLbl').attr('x',6).attr('y',4).text(d=>d.n);return g;
  });
  zoom=d3.zoom().scaleExtent([1,9]).on('zoom',ev=>gMap.attr('transform',ev.transform));
  svg.call(zoom);
  document.getElementById('zin').onclick=()=>svg.transition().call(zoom.scaleBy,1.5);
  document.getElementById('zout').onclick=()=>svg.transition().call(zoom.scaleBy,1/1.5);
  document.getElementById('zrst').onclick=()=>svg.transition().call(zoom.transform,d3.zoomIdentity);
  buildModes();renderLegend();renderDetail(null);buildSearch();renderFoot();
}
function buildRegionMesh(){
  // Build a topology from the county features themselves (works regardless of which
  // boundary source loaded), then draw only the borders between different regions.
  try{
    features.forEach(ft=>{ft.properties=Object.assign({},ft.properties||{},{_r:EDATA[ft.fips]?EDATA[ft.fips].rg:0});});
    const rtopo=topojson.topology({co:{type:'FeatureCollection',features}});
    const mesh=topojson.mesh(rtopo,rtopo.objects.co,(a,b)=>a.properties._r!==b.properties._r);
    gRegion.selectAll('path').remove();
    gRegion.append('path').datum(mesh).attr('class','regionline').attr('d',path).style('display',showRegions?null:'none');
  }catch(e){console.warn('region mesh failed',e);}
}
function paint(){gCounty.selectAll('path.county').attr('fill',d=>fillFor(d.fips));}

function buildModes(){
  const el=document.getElementById('modes');
  Object.entries(LAYERS).forEach(([k,L])=>{
    const b=document.createElement('button');b.dataset.k=k;
    b.innerHTML=`<span class="dot" style="background:${L.dot}"></span>${L.label}`;
    b.onclick=()=>{mode=k;paint();renderLegend();sync();renderDetail(selFips);};el.appendChild(b);
  });
  const t=document.createElement('label');t.className='reg-toggle';
  t.innerHTML='<input type="checkbox" id="rtog"> Show regions';el.appendChild(t);
  document.getElementById('rtog').onchange=e=>{showRegions=e.target.checked;gRegion.select('path').style('display',showRegions?null:'none');};
  sync();
}
function sync(){document.querySelectorAll('#modes button').forEach(b=>{const on=b.dataset.k===mode;b.classList.toggle('active',on);b.style.background=on?'#374151':'#fff';});}

function renderLegend(){
  const el=document.getElementById('legend');const L=LAYERS[mode];
  let h=`<h3 class="sec">${L.title}</h3>`;
  if(mode==='shift'){
    const rows=[['#840711','Strong R shift (≥15)'],['#cb181d','R shift 8–15'],['#f1593f','R shift 4–8'],['#f9b8a6','R shift 1–4'],
      ['#eef0f4','Little change'],['#bcd6ea','D shift 1–4'],['#5ba3d0','D shift 4–8'],['#1660a8','D shift ≥8']];
    rows.forEach(([c,t])=>h+=`<div class="lrow"><span class="lsw" style="background:${c}"></span>${t}</div>`);
    h+='<div class="legdesc">Change in the R–D margin from the 2022 governor race to the 2024 presidential race (points). Red = moved toward Republicans. Note: different offices, so read as overall partisan drift.</div>';
  } else if(mode==='pr26d'){
    [['#08519c','Hinojosa 70%+'],['#3182bd','Hinojosa 60–70%'],['#6baed6','Hinojosa 50–60%'],['#9ecae1','Hinojosa 40–50%'],['#deebf7','Hinojosa under 40%'],['#7b3fa0','Another candidate won']].forEach(([c,t])=>{
      const cnt=Object.values(EDATA).filter(d=>hinColor(d)===c).length;
      h+=`<div class="lrow"><span class="lsw" style="background:${c}"></span>${t}<span class="cnt">${cnt}</span></div>`;});
    h+='<div class="legdesc">Gina Hinojosa won the nine-way primary statewide with 58.5% and carried 252 of 254 counties — losing only tiny Loving (Villescaz) and Roberts (Abrego). Shading = her share of the Democratic vote. Source: official Texas Secretary of State canvass (100% reporting).</div>';
  } else if(mode==='pr26r'){
    [['#a50f15','Abbott 86%+'],['#de2d26','Abbott 82–86%'],['#fb6a4a','Abbott 78–82%'],['#fcae91','Abbott under 78%']].forEach(([c,t])=>{
      const cnt=Object.values(EDATA).filter(d=>abbColor(d)===c).length;
      h+=`<div class="lrow"><span class="lsw" style="background:${c}"></span>${t}<span class="cnt">${cnt}</span></div>`;});
    h+='<div class="legdesc">Greg Abbott won the Republican primary with 81.8% statewide against minor opposition, carrying all 254 counties. Shading = his share of the Republican vote.</div>';
  } else {
    const reps=[['#840711','Rep +40 or more'],['#bb1419','Rep +20 to 40'],['#e02c26','Rep +10 to 20'],['#f1593f','Rep +5 to 10'],['#f7a98f','Rep 0 to 5']];
    const dems=[['#a9cfe6','Dem 0 to 5'],['#5ba3d0','Dem 5 to 10'],['#2e7ebb','Dem 10 to 20'],['#1660a8','Dem 20 to 40'],['#0b3d82','Dem 40+']];
    reps.concat(dems).forEach(([c,t])=>{
      const cnt=Object.values(EDATA).filter(d=>marginColor(d[L.key].m)===c).length;
      h+=`<div class="lrow"><span class="lsw" style="background:${c}"></span>${t}<span class="cnt">${cnt}</span></div>`;
    });
    const rwon=Object.values(EDATA).filter(d=>d[L.key].m>0).length;
    h+=`<div class="legdesc">${L.rname} (R) carried ${rwon} counties; ${L.dname} (D) carried ${N-rwon}. Shading = winner’s margin. Source: Texas Secretary of State.</div>`;
  }
  el.innerHTML=h;
}

function vbar(name,votes,pct,color){
  return `<div class="vbar"><div class="top"><span>${name}</span><span><b>${pct}%</b> · ${fmt(votes)}</span></div>
    <div class="track"><i style="width:${pct}%;background:${color}"></i></div></div>`;
}
function contestCard(L,d){
  const c=d[L.key];const rpct=+(c.r/c.t*100).toFixed(1),dpct=+(c.d/c.t*100).toFixed(1);
  const repWon=c.m>0;const win=repWon?L.rname:L.dname;const wc=repWon?'var(--rep)':'var(--dem)';
  return `<div class="ccard"><div class="ct"><span>${L.label}</span><span class="wbadge" style="background:${wc}">${win} +${Math.abs(c.m).toFixed(1)}</span></div>
    ${vbar(L.rname,c.r,rpct,'#cb181d')}${vbar(L.dname,c.d,dpct,'#2171b5')}
    <div style="font-size:11px;color:var(--muted);margin-top:4px">${fmt(c.t)} total votes</div></div>`;
}
function renderDetail(f){
  const el=document.getElementById('detail');
  if(!f||!EDATA[f]){
    el.innerHTML='<h3 class="sec">County profile</h3><div class="hint">Click a county to see its 2022 governor and 2024 presidential vote breakdown here.</div>'+primary2026Card();
    return;
  }
  const d=EDATA[f];
  let h=`<div class="cty">${d.n}</div><div class="tot">Population ${fmt(d.pop)}</div>`;
  if(d.rg)h+=`<span class="pill" style="background:${REGIONS.find(R=>R.id===d.rg).color}">▰ ${REGION_NAME[d.rg]}</span>`;
  h+=contestCard(LAYERS.g22,d)+contestCard(LAYERS.p24,d);
  const s=d.shift;const dir=s>0?'toward Republicans':'toward Democrats';
  h+=`<div class="shiftline">Shift ’22→’24: <b>${s>0?'+':''}${s} pts ${dir}</b> (margin moved from ${d.g22.m>0?'R+':'D+'}${Math.abs(d.g22.m)} to ${d.p24.m>0?'R+':'D+'}${Math.abs(d.p24.m)}).</div>`;
  el.innerHTML=h+county26Card(d);
}
function county26Card(d){
  const p=d.pr26;const demWon=p.win==='Hinojosa';
  const demBadge=demWon?`Hinojosa +`:`${p.win} +`;
  return `<h3 class="sec" style="margin-top:18px">2026 Governor primary (this county)</h3>
    <div class="ccard">
      <div class="ct"><span>Democratic primary</span><span class="wbadge" style="background:${demWon?'var(--dem)':'#7b3fa0'}">${p.win}</span></div>
      ${vbar('Gina Hinojosa',Math.round(p.hin/100*p.t),p.hin,'#2171b5')}
      <div style="font-size:11px;color:var(--muted);margin-top:4px">${fmt(p.t)} Democratic primary votes${demWon?'':` · ${p.win} carried this county (${p.winpct}%)`}</div>
      <div class="ct" style="margin-top:10px"><span>Republican primary</span><span class="wbadge" style="background:var(--rep)">Abbott</span></div>
      ${vbar('Greg Abbott',p.abbV,p.abb,'#cb181d')}
      <div style="font-size:11px;color:var(--muted);margin-top:4px">${fmt(p.rt)} Republican primary votes</div>
    </div>`;
}
function primary2026Card(){
  const P=PRIMARY2026;
  return `<h3 class="sec" style="margin-top:18px">2026 Governor primary — statewide</h3>
    <div class="p26">
      <div class="row"><span class="win" style="color:var(--rep)">R · ${P.rep.winner}</span><span><b>${P.rep.pct}%</b> · ${fmt(P.rep.votes)}</span></div>
      <div class="row" style="color:var(--muted)"><span>Republican primary</span><span>${P.rep.winner} essentially unopposed</span></div>
      <div class="row" style="margin-top:7px"><span class="win" style="color:var(--dem)">D · ${P.dem.winner}</span><span><b>${P.dem.pct}%</b> · ${fmt(P.dem.votes)}</span></div>
      <div class="row" style="color:var(--muted)"><span>Democratic primary (9-way)</span><span>Chris Bell 9.8% · A. White 5.3%</span></div>
      <div class="hint">${P.date}. County-level breakdowns weren’t available from public, machine-readable sources, so the 2026 primary is shown statewide only. Source: Texas SoS / Wikipedia.</div>
    </div>`;
}

function select(f){selFips=f;gCounty.selectAll('path.county').classed('sel',d=>d.fips===f);renderDetail(f);}
function showTip(e,f){const d=EDATA[f];if(!d)return;let v;
  if(mode==='shift')v=`${d.shift>0?'+':''}${d.shift} pts ${d.shift>0?'→R':'→D'}`;
  else if(mode==='pr26d')v=d.pr26.win==='Hinojosa'?`Hinojosa ${d.pr26.hin}%`:`${d.pr26.win} won (Hinojosa ${d.pr26.hin}%)`;
  else if(mode==='pr26r')v=`Abbott ${d.pr26.abb}%`;
  else{const c=d[LAYERS[mode].key];const w=c.m>0?LAYERS[mode].rname:LAYERS[mode].dname;v=`${w} +${Math.abs(c.m).toFixed(1)}`;}
  tip.innerHTML=`<b>${d.n.replace(' County','')}</b> — ${v}`;
  const r=document.getElementById('mapwrap').getBoundingClientRect();
  tip.style.left=(e.clientX-r.left+12)+'px';tip.style.top=(e.clientY-r.top+12)+'px';tip.style.opacity=1;
}
function buildSearch(){const dl=document.getElementById('ctylist'),map={};
  Object.entries(EDATA).forEach(([f,d])=>{const o=document.createElement('option');o.value=d.n.replace(' County','');dl.appendChild(o);map[o.value.toLowerCase()]=f;});
  document.getElementById('search').addEventListener('change',e=>{const f=map[e.target.value.trim().toLowerCase()];if(f){select(f);zoomTo(f);}});
}
function zoomTo(f){const node=gCounty.selectAll('path.county').filter(d=>d.fips===f).node();if(!node)return;
  const b=node.getBBox(),cx=b.x+b.width/2,cy=b.y+b.height/2,k=Math.min(7,0.5*Math.min(W/b.width,H/b.height));
  svg.transition().duration(450).call(zoom.transform,d3.zoomIdentity.translate(W/2,H/2).scale(k).translate(-cx,-cy));
}
function renderFoot(){
  document.getElementById('foot').innerHTML='Statewide: 2022 Gov — Abbott (R) 54.8%, O’Rourke (D) 43.9%. 2024 Pres — Trump (R) 56.2%, Harris (D) 42.4%. 2026 Dem primary — Hinojosa 58.5% (2,203,671 votes). 254 counties. Sources: Texas Secretary of State — 2022/2024 via TexasCounties.net; 2026 primaries (both parties) from the official SoS county canvass.';
}
load();
</script>
</body>
</html>
