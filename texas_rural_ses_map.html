<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Texas Counties — Rural-Urban &amp; Socioeconomic Status</title>
<style>
  :root{
    --bg:#eef1f6; --panel:#ffffff; --ink:#161b26; --muted:#697084; --line:#e3e7ee; --accent:#0f5fa6;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg)}
  #app{display:flex;flex-direction:column;height:100vh}
  header{padding:13px 20px;border-bottom:1px solid var(--line);background:var(--panel);box-shadow:0 1px 3px rgba(20,27,38,.04)}
  .htop{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  h1{font-size:19px;margin:0;font-weight:700;letter-spacing:-.01em}
  .sub{font-size:12px;color:var(--muted)}
  .modes{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;align-items:center}
  .modes .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-right:2px}
  .modes button{border:1px solid var(--line);background:#fff;color:var(--ink);padding:7px 13px;border-radius:999px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .12s}
  .modes button .dot{width:11px;height:11px;border-radius:3px}
  .modes button:hover{border-color:#b9c0cf;transform:translateY(-1px)}
  .modes button.active{color:#fff;border-color:transparent;font-weight:600;box-shadow:0 2px 6px rgba(20,27,38,.18)}
  main{flex:1;display:flex;min-height:0}
  #mapwrap{flex:1;position:relative;min-width:0;background:radial-gradient(circle at 50% 30%,#f4f7fb,#e6eaf2)}
  svg#map{width:100%;height:100%;display:block;cursor:grab}
  svg#map:active{cursor:grabbing}
  .county{stroke:#ffffff;stroke-width:.5px;stroke-linejoin:round;transition:fill-opacity .12s,stroke-width .12s}
  .county:hover{stroke:#0d1320;stroke-width:1.3px}
  .county.sel{stroke:#0d1320;stroke-width:2px}
  .cityDot{fill:#11151d;stroke:#fff;stroke-width:1.2px;pointer-events:none}
  .cityLbl{font-size:12px;font-weight:600;fill:#11151d;paint-order:stroke;stroke:#fff;stroke-width:3px;stroke-linejoin:round;pointer-events:none}
  aside{width:370px;border-left:1px solid var(--line);background:var(--panel);overflow-y:auto;padding:18px}
  .search{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:13px;margin-bottom:15px}
  .legend h3,.detail h3{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 9px}
  .legend{margin-bottom:16px;padding-bottom:15px;border-bottom:1px solid var(--line)}
  .lrow{display:flex;align-items:center;gap:9px;font-size:12.5px;margin:5px 0}
  .lsw{width:26px;height:14px;border-radius:3px;flex:none;border:1px solid rgba(0,0,0,.08)}
  .lrow .cnt{margin-left:auto;color:var(--muted);font-size:11px}
  .legdesc{font-size:11.5px;color:var(--muted);margin-top:9px;line-height:1.45}
  .detail .cty{font-size:20px;font-weight:700;margin:2px 0 1px;letter-spacing:-.01em}
  .detail .tot{font-size:12px;color:var(--muted);margin-bottom:13px}
  .pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;color:#fff;margin-bottom:12px}
  .metric{margin:11px 0}
  .metric .top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px}
  .metric .top .nm{font-weight:600}
  .metric .top .vals{color:var(--muted)}
  .metric .top .vals b{color:var(--ink)}
  .track{height:14px;background:#eef0f4;border-radius:5px;overflow:hidden}
  .track > i{display:block;height:100%;border-radius:5px}
  .rank{font-size:11px;color:var(--muted);margin-top:3px}
  .ses-big{display:flex;align-items:baseline;gap:9px;margin:6px 0 2px}
  .ses-big .v{font-size:26px;font-weight:800;letter-spacing:-.02em}
  .ses-big .l{font-size:12px;color:var(--muted)}
  .hint{font-size:11.5px;color:var(--muted);line-height:1.5;margin-top:6px}
  footer{padding:7px 20px;border-top:1px solid var(--line);background:var(--panel);font-size:11px;color:var(--muted)}
  .zc{position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column;gap:5px}
  .zc button{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:17px;cursor:pointer;color:var(--ink)}
  .zc button:hover{background:#f1f5f9}
  #tip{position:absolute;pointer-events:none;background:rgba(13,19,32,.92);color:#fff;font-size:12px;padding:6px 9px;border-radius:7px;opacity:0;transition:opacity .1s;z-index:9;white-space:nowrap}
  #tip b{font-weight:700}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="htop">
      <h1>Texas Counties — Rural-Urban Class &amp; Socioeconomic Status</h1>
      <span class="sub">254 counties · pick a layer below · click any county for its full profile</span>

    <div class="modes" id="modes"><span class="lbl">Layer</span></div>
  </header>
  <main>
    <div id="mapwrap">
      <svg id="map"></svg>
      <div class="zc"><button id="zin">+</button><button id="zout">−</button><button id="zrst" style="font-size:12px">⟲</button></div>
      <div id="tip"></div>
    </div>
    <aside>
      <input class="search" id="search" list="ctylist" placeholder="Search a county…">
      <datalist id="ctylist"></datalist>
      <div class="legend" id="legend"></div>
      <div class="detail" id="detail"></div>
    </aside>
  </main>
  <footer id="foot"></footer>
</div>

<script>

// ---------- custom regions (authoritative, from Texas Region Builder, baked 2026-06-04) ----------

Object.keys(CDATA).forEach(f=>{CDATA[f].rg=(REGION_STATIC[f]||0);});

// ---------- layer definitions ----------
const RU_LABELS={1:'Urban core / Large metro',2:'Suburban / Smaller metro',3:'Micropolitan (large rural town)',4:'Small-town rural',5:'Remote rural / Frontier'};
const RU_COLORS={1:'#08519c',2:'#3182bd',3:'#9ecae1',4:'#fdae6b',5:'#d94801'};
const RU_DESC={1:'In a metro area of 1M+ people (Houston, DFW, San Antonio, Austin).',2:'In a smaller Metropolitan Statistical Area (250K–1M or &lt;250K).',3:'Nonmetro county with an urban cluster of 20K+ residents.',4:'Nonmetro county, largest town roughly 7K–20K.',5:'Nonmetro county under ~7K people; sparsely settled / frontier.'};

const SES_COLORS=['#a6611a','#dfc27d','#dfe7e5','#80cdc1','#018571']; // low→high
const SES_LABELS=['Most disadvantaged','Lower-middle','Middle','Upper-middle','Most advantaged'];

// numeric layers: build quantile breaks from data
function quantileBreaks(vals,k){const s=[...vals].sort((a,b)=>a-b);const br=[];for(let i=1;i<k;i++)br.push(s[Math.floor(i*s.length/k)]);return br;}
function classOf(v,br){let i=0;while(i<br.length&&v>=br[i])i++;return i;}
function ramp(stops){return stops;}
const GREEN=['#edf8e9','#c7e9c0','#a1d99b','#74c476','#31a354','#006d2c'];
const RED  =['#fee5d9','#fcbba1','#fc9272','#fb6a4a','#de2d26','#a50f15'];

const allInc=Object.values(CDATA).map(d=>d.inc);
const allPov=Object.values(CDATA).map(d=>d.pov);
const allEdu=Object.values(CDATA).map(d=>d.edu);
const brInc=quantileBreaks(allInc,6), brPov=quantileBreaks(allPov,6), brEdu=quantileBreaks(allEdu,6);

const LAYERS={
  ru :{label:'Rural–Urban', dot:'linear-gradient(90deg,#08519c,#3182bd,#9ecae1,#fdae6b,#d94801)', kind:'cat'},
  reg:{label:'Custom regions', dot:'linear-gradient(90deg,#3b82f6,#6287b5,#809351,#caa92f,#4a0404)', kind:'region'},
  ses:{label:'SES index',   dot:'linear-gradient(90deg,#a6611a,#dfe7e5,#018571)', kind:'ses'},
  inc:{label:'Median income', dot:'#31a354', kind:'num', ramp:GREEN, br:brInc, hi:'good',
       fmt:usd, name:'Median household income'},
  pov:{label:'Poverty rate', dot:'#de2d26', kind:'num', ramp:RED, br:brPov, hi:'bad',
       fmt:v=>v+'%', name:'Persons in poverty'},
  edu:{label:"Bachelor's+", dot:'#31a354', kind:'num', ramp:GREEN, br:brEdu, hi:'good',
       fmt:v=>v+'%', name:"Bachelor's degree or higher (age 25+)"}
};
let mode='ru';

// ranks
const RANK={};['inc','pov','edu','sesz'].forEach(k=>{
  const s=Object.entries(CDATA).sort((A,B)=>B[1][k]-A[1][k]);
  s.forEach(([f],i)=>{(RANK[f]=RANK[f]||{})[k]=i+1;});
});
const N=Object.keys(CDATA).length;

function fillFor(f){const d=CDATA[f];if(!d)return '#dfe3ea';
  if(mode==='ru')return RU_COLORS[d.ru];
  if(mode==='reg')return d.rg?REGION_COLORS[d.rg]:'#e4e8ef';
  if(mode==='ses')return SES_COLORS[d.sesq];
  const L=LAYERS[mode];return L.ramp[classOf(d[mode],L.br)];
}

// ---------- map setup ----------
const CITIES=[
  {n:'Houston',lon:-95.3698,lat:29.7604},{n:'San Antonio',lon:-98.4936,lat:29.4241},
  {n:'Dallas',lon:-96.7970,lat:32.7767},{n:'Fort Worth',lon:-97.3308,lat:32.7555},
  {n:'Austin',lon:-97.7431,lat:30.2672},{n:'El Paso',lon:-106.4850,lat:31.7619},
  {n:'Corpus Christi',lon:-97.3964,lat:27.8006},{n:'Lubbock',lon:-101.8552,lat:33.5779},
  {n:'Amarillo',lon:-101.8313,lat:35.2220},{n:'Laredo',lon:-99.5075,lat:27.5306},
  {n:'Brownsville',lon:-97.4975,lat:25.9017},{n:'Midland',lon:-102.0779,lat:31.9974}
];
const svg=d3.select('#map'),gMap=svg.append('g'),gCounty=gMap.append('g'),gCity=gMap.append('g');
const tip=document.getElementById('tip');
let path,features=[],selFips=null,zoom,projection;
const W=980,H=770;

function detectGeoid(props,id){
  if(props){
    if(props.GEOID) return String(props.GEOID).padStart(5,'0');
    if(props.STATE&&props.COUNTY) return String(props.STATE).padStart(2,'0')+String(props.COUNTY).padStart(3,'0');
    if(props.FIPS) return String(props.FIPS).padStart(5,'0');
    if(props.fips) return String(props.fips).padStart(5,'0');
  }
  if(id!=null) return String(id).padStart(5,'0');
  return null;
}

async function load(){
  const SOURCES=[
    {url:'https://cdn.jsdelivr.net/gh/deldersveld/topojson@master/countries/us-states/TX-48-texas-counties.json',type:'topo'},
    {url:'https://cdn.jsdelivr.net/gh/plotly/datasets@master/geojson-counties-fips.json',type:'geo'}
  ];
  let feats=null;
  for(const s of SOURCES){
    try{
      const res=await fetch(s.url);if(!res.ok)throw new Error(res.status);const j=await res.json();
      if(s.type==='topo'){
        const key=Object.keys(j.objects)[0];const obj=j.objects[key];
        feats=topojson.feature(j,obj).features;
      } else feats=j.features;
      feats=feats.map(ft=>{const g=detectGeoid(ft.properties,ft.id);ft.geoid=g;ft.fips=g?g.slice(-3):null;return ft;})
                 .filter(ft=>ft.geoid&&ft.geoid.slice(0,2)==='48'&&CDATA[ft.fips]);
      if(feats.length>=240) break;
    }catch(e){console.warn('source failed',s.url,e);feats=null;}
  }
  if(!feats||!feats.length){document.getElementById('mapwrap').insertAdjacentHTML('beforeend','<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#697084">Could not load county boundaries (needs internet).</div>');return;}
  features=feats;draw();
}

function draw(){
  projection=d3.geoAlbers().rotate([99,0]).center([0,31.3]).parallels([28,36]);
  projection.fitExtent([[18,18],[W-18,H-18]],{type:'FeatureCollection',features});
  path=d3.geoPath(projection);
  svg.attr('viewBox',`0 0 ${W} ${H}`);

  gCounty.selectAll('path.county').data(features,d=>d.fips).join('path')
    .attr('class','county').attr('d',path).attr('fill',d=>fillFor(d.fips))
    .on('mousemove',(e,d)=>showTip(e,d.fips)).on('mouseleave',hideTip)
    .on('click',(e,d)=>{select(d.fips);});

  gCity.selectAll('g.city').data(CITIES).join(enter=>{
    const g=enter.append('g').attr('class','city').attr('transform',d=>{const p=projection([d.lon,d.lat]);return `translate(${p[0]},${p[1]})`;});
    g.append('circle').attr('class','cityDot').attr('r',3.3);
    g.append('text').attr('class','cityLbl').attr('x',6).attr('y',4).text(d=>d.n);
    return g;
  });

  zoom=d3.zoom().scaleExtent([1,9]).on('zoom',ev=>gMap.attr('transform',ev.transform));
  svg.call(zoom);
  document.getElementById('zin').onclick=()=>svg.transition().call(zoom.scaleBy,1.5);
  document.getElementById('zout').onclick=()=>svg.transition().call(zoom.scaleBy,1/1.5);
  document.getElementById('zrst').onclick=()=>svg.transition().call(zoom.transform,d3.zoomIdentity);
  buildModes();renderLegend();renderDetail(null);buildSearch();renderFoot();
}

function paint(){gCounty.selectAll('path.county').attr('fill',d=>fillFor(d.fips));}

// ---------- modes ----------
function buildModes(){
  const el=document.getElementById('modes');
  Object.entries(LAYERS).forEach(([k,L])=>{
    const b=document.createElement('button');b.dataset.k=k;
    b.innerHTML=`<span class="dot" style="background:${L.dot}"></span>${L.label}`;
    b.onclick=()=>{mode=k;paint();renderLegend();syncModes();renderDetail(selFips);renderFoot();};
    el.appendChild(b);
  });
  syncModes();
}
function syncModes(){document.querySelectorAll('#modes button').forEach(b=>{
  const on=b.dataset.k===mode;b.classList.toggle('active',on);
  b.style.background=on?(mode==='inc'||mode==='edu'?'#31a354':mode==='pov'?'#de2d26':mode==='ses'?'#018571':mode==='reg'?'#809351':'#3182bd'):'#fff';
});}

// ---------- legend ----------
function renderLegend(){
  const el=document.getElementById('legend');const L=LAYERS[mode];
  const counts=f=>Object.values(CDATA).filter(f).length;
  if(mode==='ru'){
    let h='<h3>Rural–Urban classification</h3>';
    [1,2,3,4,5].forEach(t=>{const c=Object.values(CDATA).filter(d=>d.ru===t).length;
      h+=`<div class="lrow"><span class="lsw" style="background:${RU_COLORS[t]}"></span>${RU_LABELS[t]}<span class="cnt">${c}</span></div>`;});
    h+='<div class="legdesc">Top two tiers use 2023 OMB metro-area delineations; the three nonmetro tiers approximate USDA Rural-Urban Continuum Codes by county population. Click a county for details.</div>';
    el.innerHTML=h;return;
  }
  if(mode==='reg'){
    let h='<h3>Custom regions</h3>';
    REGIONS.forEach(R=>{const c=Object.values(CDATA).filter(d=>d.rg===R.id).length;
      h+=`<div class="lrow"><span class="lsw" style="background:${R.color}"></span>${R.name}<span class="cnt">${c}</span></div>`;});
    const un=Object.values(CDATA).filter(d=>!d.rg).length;
    if(un)h+=`<div class="lrow"><span class="lsw" style="background:#e4e8ef"></span>Unassigned<span class="cnt">${un}</span></div>`;
    h+='<div class="legdesc">Your six saved regions from the Texas Region Builder. The same definitions are used in the race/ethnicity and families maps. Click a county for its region.</div>';
    el.innerHTML=h;return;
  }
  if(mode==='ses'){
    let h='<h3>Socioeconomic status index</h3>';
    [4,3,2,1,0].forEach(q=>{const c=Object.values(CDATA).filter(d=>d.sesq===q).length;
      h+=`<div class="lrow"><span class="lsw" style="background:${SES_COLORS[q]}"></span>${SES_LABELS[q]}<span class="cnt">${c}</span></div>`;});
    h+='<div class="legdesc">Composite of median household income, poverty rate, and bachelor’s-degree share (equal-weighted z-scores). Counties split into quintiles. Higher = more advantaged.</div>';
    el.innerHTML=h;return;
  }
  // numeric
  let h=`<h3>${L.name}</h3>`;
  const br=L.br,ramp=L.ramp;
  const edges=[Math.min(...Object.values(CDATA).map(d=>d[mode])),...br,Math.max(...Object.values(CDATA).map(d=>d[mode]))];
  for(let i=0;i<ramp.length;i++){
    const lo=edges[i],hi=edges[i+1];
    const c=Object.values(CDATA).filter(d=>classOf(d[mode],br)===i).length;
    h+=`<div class="lrow"><span class="lsw" style="background:${ramp[i]}"></span>${L.fmt(Math.round(lo))} – ${L.fmt(Math.round(hi))}<span class="cnt">${c}</span></div>`;
  }
  const dir=L.hi==='bad'?'Darker red = higher poverty (worse).':'Darker green = higher value (better).';
  h+=`<div class="legdesc">${dir} 6 equal-count (quantile) classes. Source: U.S. Census Bureau (ACS / SAIPE).</div>`;
  el.innerHTML=h;
}

// ---------- detail ----------
function bar(label,val,frac,color,sub){
  return `<div class="metric"><div class="top"><span class="nm">${label}</span><span class="vals"><b>${val}</b> ${sub||''}</span></div>
    <div class="track"><i style="width:${Math.max(2,Math.min(100,frac*100)).toFixed(1)}%;background:${color}"></i></div></div>`;
}
function renderDetail(f){
  const el=document.getElementById('detail');
  if(!f||!CDATA[f]){el.innerHTML='<h3>County profile</h3><div class="hint">Hover the map to compare, or click a county to pin its full socioeconomic + rural-urban profile here. Use the search box to jump to one.</div>';return;}
  const d=CDATA[f];
  const incMax=Math.max(...Object.values(CDATA).map(x=>x.inc));
  const eduMax=Math.max(...Object.values(CDATA).map(x=>x.edu));
  const povMax=Math.max(...Object.values(CDATA).map(x=>x.pov));
  const sesPct=Math.round((N-RANK[f].sesz+1)/N*100);
  let h=`<div class="cty">${d.n}</div><div class="tot">Population ${fmt(d.pop)} · rank #${rankPop(f)} of ${N} by population</div>`;
  h+=`<span class="pill" style="background:${RU_COLORS[d.ru]}">${RU_LABELS[d.ru]}</span>`;
  h+=d.rg?`<span class="pill" style="background:${REGION_COLORS[d.rg]};margin-left:6px">▰ ${REGION_NAME[d.rg]}</span>`:`<span class="pill" style="background:#94a3b8;margin-left:6px">▰ No region</span>`;
  h+=`<div class="ses-big"><span class="v" style="color:${SES_COLORS[d.sesq]}">${d.sesz>0?'+':''}${d.sesz.toFixed(2)}</span><span class="l">SES index — ${SES_LABELS[d.sesq]}<br>${ordinal(sesPct)} percentile · rank #${RANK[f].sesz} of ${N}</span></div>`;
  h+='<h3 style="margin-top:16px">Indicators</h3>';
  h+=bar('Median household income',usd(d.inc),d.inc/incMax,'#31a354',`· #${RANK[f].inc}`);
  h+=bar('Poverty rate',d.pov+'%',d.pov/povMax,'#de2d26',`· #${RANK[f].pov} highest`);
  h+=bar("Bachelor's degree or higher",d.edu+'%',d.edu/eduMax,'#3182bd',`· #${RANK[f].edu}`);
  h+='<div class="hint">Income / education: ACS 2014–2018 5-year. Poverty: Census SAIPE. Bars scaled to the statewide maximum; ranks are out of 254 counties (income & education ranked high→low, poverty high→low).</div>';
  el.innerHTML=h;
}
const POPRANK={};Object.entries(CDATA).sort((a,b)=>b[1].pop-a[1].pop).forEach(([f],i)=>POPRANK[f]=i+1);
function rankPop(f){return POPRANK[f];}
function ordinal(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}

// ---------- selection / tip / search ----------
function select(f){selFips=f;gCounty.selectAll('path.county').classed('sel',d=>d.fips===f);renderDetail(f);}
function showTip(e,f){const d=CDATA[f];if(!d)return;const L=LAYERS[mode];let v;
  if(mode==='ru')v=RU_LABELS[d.ru];
  else if(mode==='reg')v=d.rg?REGION_NAME[d.rg]:'Unassigned';
  else if(mode==='ses')v=`SES ${d.sesz>0?'+':''}${d.sesz.toFixed(2)} (${SES_LABELS[d.sesq]})`;
  else v=`${L.name}: ${L.fmt(d[mode])}`;
  tip.innerHTML=`<b>${d.n.replace(' County','')}</b> — ${v}`;
  const r=document.getElementById('mapwrap').getBoundingClientRect();
  tip.style.left=(e.clientX-r.left+12)+'px';tip.style.top=(e.clientY-r.top+12)+'px';tip.style.opacity=1;
}
function hideTip(){tip.style.opacity=0;}
function buildSearch(){const dl=document.getElementById('ctylist'),map={};
  Object.entries(CDATA).forEach(([f,d])=>{const o=document.createElement('option');o.value=d.n.replace(' County','');dl.appendChild(o);map[o.value.toLowerCase()]=f;});
  document.getElementById('search').addEventListener('change',e=>{const f=map[e.target.value.trim().toLowerCase()];if(f){select(f);zoomTo(f);}});
}
function zoomTo(f){const node=gCounty.selectAll('path.county').filter(d=>d.fips===f).node();if(!node)return;
  const b=node.getBBox(),cx=b.x+b.width/2,cy=b.y+b.height/2,k=Math.min(7,0.5*Math.min(W/b.width,H/b.height));
  svg.transition().duration(500).call(zoom.transform,d3.zoomIdentity.translate(W/2,H/2).scale(k).translate(-cx,-cy));
}
function renderFoot(){
  const inc=Object.values(CDATA).map(d=>d.inc),pov=Object.values(CDATA).map(d=>d.pov);
  const med=a=>{const s=[...a].sort((x,y)=>x-y);return s[Math.floor(s.length/2)];};
  document.getElementById('foot').innerHTML=`Statewide median of county median-incomes ${usd(med(inc))} · median county poverty ${med(pov)}% · ${N} counties. Rural tiers: 33 large-metro, 48 smaller-metro, 173 nonmetro. Sources: U.S. Census Bureau ACS 2014–2018 &amp; SAIPE; USDA ERS Rural-Urban Continuum methodology; OMB 2023 metro delineations.`;
}

load();
</script>
