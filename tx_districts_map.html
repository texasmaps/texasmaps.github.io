<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Texas Districts Explorer — House · Senate · Congress</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
  :root{--bg:#eef1f6;--panel:#fff;--ink:#161b26;--muted:#697084;--line:#e3e7ee;--accent:#0f5fa6;
        --rep:#cb181d;--dem:#2171b5;--teal:#0891b2;--sel:#f5a623;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink)}
  #app{display:flex;flex-direction:column;height:100vh}
  header{background:var(--panel);border-bottom:1px solid var(--line);box-shadow:0 1px 4px rgba(20,27,38,.07);padding:9px 16px;z-index:1000}
  .row1{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  h1{font-size:16px;margin:0;font-weight:700;letter-spacing:-.01em;white-space:nowrap}
  .chambers{display:flex;gap:6px}
  .chambers button{border:1px solid var(--line);background:#fff;color:var(--ink);padding:6px 13px;border-radius:999px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .12s}
  .chambers button .dot{width:10px;height:10px;border-radius:3px}
  .chambers button.active{color:#fff;border-color:transparent;font-weight:600;box-shadow:0 2px 6px rgba(20,27,38,.18)}
  .chambers button.active.cC{background:#6d28d9}.chambers button.active.cH{background:#0891b2}.chambers button.active.cS{background:#b45309}
  .searchwrap{position:relative;flex:1;min-width:240px;max-width:520px}
  #search{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-size:13.5px}
  #drop{position:absolute;top:42px;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:9px;box-shadow:0 8px 24px rgba(20,27,38,.16);max-height:340px;overflow-y:auto;display:none;z-index:1200}
  #drop .grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:8px 12px 3px;background:#fafbfd}
  #drop .opt{padding:8px 12px;font-size:13px;cursor:pointer;border-top:1px solid #f1f3f7;display:flex;align-items:center;gap:9px}
  #drop .opt:hover{background:#eff6ff}
  #drop .opt .badge{font-size:10px;font-weight:700;color:#fff;border-radius:5px;padding:1px 6px;flex:none}
  .sub{font-size:11.5px;color:var(--muted)}
  main{flex:1;display:flex;min-height:0}
  #map{flex:1;min-width:0;background:#dfe6ee}
  aside{width:340px;border-left:1px solid var(--line);background:var(--panel);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
  .card{border:1px solid var(--line);border-radius:11px;padding:13px 14px}
  .card h2{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 8px}
  .dnum{font-size:21px;font-weight:800;letter-spacing:-.01em;margin:0}
  .mname{font-size:16px;font-weight:600;margin:3px 0 2px}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;color:#fff;margin-top:4px}
  .pill.R{background:var(--rep)}.pill.D{background:var(--dem)}.pill.X{background:#94a3b8}
  .contact a{color:var(--accent);text-decoration:none;font-size:13px}
  .contact a:hover{text-decoration:underline}
  .legend{font-size:12px;color:var(--muted);line-height:1.5}
  .legend .lrow{display:flex;align-items:center;gap:8px;margin:3px 0;color:var(--ink)}
  .legend .sw{width:18px;height:12px;border-radius:3px;flex:none;border:1px solid rgba(0,0,0,.1)}
  .hint{font-size:12px;color:var(--muted);line-height:1.55}
  .cityrow{display:flex;justify-content:space-between;gap:8px;font-size:13px;padding:6px 0;border-top:1px solid #f1f3f7}
  .cityrow:first-child{border-top:0}
  .cityrow b{font-weight:600}
  .loading{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:#161b26;color:#fff;padding:6px 14px;border-radius:999px;font-size:12px;z-index:1100;opacity:0;transition:opacity .2s;pointer-events:none}
  .loading.on{opacity:.92}
  .foot{font-size:10.5px;color:var(--muted);margin-top:auto;line-height:1.5}
  .dlabel{font-size:11px;font-weight:700;color:#1a2233;text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 3px #fff;background:transparent;border:0;box-shadow:none}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="row1">
      <h1>🗺 Texas Districts</h1>
      <div class="chambers" id="chambers">
        <button data-ch="C" class="cC active"><span class="dot" style="background:#6d28d9"></span>U.S. Congress</button>
        <button data-ch="H" class="cH"><span class="dot" style="background:#0891b2"></span>State House</button>
        <button data-ch="S" class="cS"><span class="dot" style="background:#b45309"></span>State Senate</button>
      </div>
      <div class="searchwrap">
        <input id="search" autocomplete="off" placeholder="Search a name (Hinojosa), a district (HD 49, SD 14, CD 37), or a city (Round Rock)…">
        <div id="drop"></div>
      </div>
    </div>
  </header>
  <main>
    <div id="map"><div class="loading" id="loading">Loading…</div></div>
    <aside id="aside">
      <div class="card" id="info">
        <h2>District info</h2>
        <p class="hint">Click any district on the map, or use the search box. You can search by a legislator’s name, a district number, or a Texas city to see which districts it falls in.</p>
      </div>
      <div class="card legend" id="legend"></div>
      <div class="foot" id="foot"></div>
    </aside>
  </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="tx_roster.js"></script>
<script>
(function(){
"use strict";
var ROSTER = window.TX_ROSTER || {H:{},S:{},C:{}};

// ---- endpoints ----
var EP = {
  C: "https://giswebe.tlc.texas.gov/ArcGIS/rest/services/plan_shaded/MapServer/0/query?where="+encodeURIComponent("REDAPPL_PLAN_ID=5481 AND DISTRICT>0")+"&outFields=DISTRICT&returnGeometry=true&f=geojson&geometryPrecision=5&maxAllowableOffset=0.0015&outSR=4326",
  H: "https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/Legislative/MapServer/6/query?where="+encodeURIComponent("STATE='48'")+"&outFields=BASENAME&returnGeometry=true&f=geojson&geometryPrecision=5&maxAllowableOffset=0.0015&outSR=4326",
  S: "https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/Legislative/MapServer/5/query?where="+encodeURIComponent("STATE='48'")+"&outFields=BASENAME&returnGeometry=true&f=geojson&geometryPrecision=5&maxAllowableOffset=0.0015&outSR=4326"
};
var CITY_EP = function(layer){return "https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/Places_CouSub_ConCity_SubMCD/MapServer/"+layer+"/query?where="+encodeURIComponent("STATE='48'")+"&outFields=BASENAME,CENTLAT,CENTLON&returnGeometry=false&f=json&resultRecordCount=6000";};
var CHNAME = {C:"U.S. Congress", H:"Texas House", S:"Texas Senate"};
var CHPREFIX = {C:"CD", H:"HD", S:"SD"};
var CHCOLOR = {C:"#6d28d9", H:"#0891b2", S:"#b45309"};

// ---- map ----
var map = L.map('map', {zoomControl:true, minZoom:5, maxZoom:16}).setView([31.3, -99.2], 6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap &copy; CARTO · districts: TX Legislative Council',
  subdomains:'abcd', maxZoom:19
}).addTo(map);

var loadingEl = document.getElementById('loading');
function loading(on,msg){ if(msg)loadingEl.textContent=msg; loadingEl.classList.toggle('on',!!on); }

// distNum -> distId helpers
function distOf(feat, ch){
  var p = feat.properties || {};
  if(ch==='C') return String(p.District);
  return String(parseInt(p.BASENAME,10));
}
function memberOf(ch, d){
  var m = (ROSTER[ch]||{})[String(d)];
  if(!m) return null;
  return {first:m[0], last:m[1], party:(ch==='C'? (m[2]||'') : '')};
}
function fullName(m){ return m ? ((m.first?m.first+' ':'')+m.last) : ''; }

// ---- layer cache & rendering ----
var layers = {};   // ch -> {geojson, leaflet}
var active = 'C';
var selected = null; // {ch, d, layer}

function styleFor(ch, d){
  if(ch==='C'){
    var m = memberOf('C', d);
    var c = m && m.party==='R' ? 'var(--rep)' : (m && m.party==='D' ? 'var(--dem)' : '#94a3b8');
    return {color:'#ffffff', weight:1, fillColor:c, fillOpacity:.45};
  }
  return {color:'#ffffff', weight:1, fillColor:CHCOLOR[ch], fillOpacity:.30};
}

function fetchLayer(ch){
  if(layers[ch]) return Promise.resolve(layers[ch]);
  loading(true,'Loading '+CHNAME[ch]+' boundaries…');
  return fetch(EP[ch]).then(function(r){return r.json();}).then(function(gj){
    var lyr = L.geoJSON(gj, {
      style: function(f){ return styleFor(ch, distOf(f,ch)); },
      onEachFeature: function(f, l){
        var d = distOf(f, ch);
        l.on('click', function(){ selectDistrict(ch, d, true); });
        l.on('mouseover', function(){ l.setStyle({weight:2.4, color:'#0d1320'}); });
        l.on('mouseout', function(){ if(!(selected&&selected.ch===ch&&selected.d===d)) l.setStyle(styleFor(ch,d)); });
        l.bindTooltip(CHPREFIX[ch]+'-'+d, {sticky:true, direction:'top', opacity:.92});
        f.__d = d;
      }
    });
    layers[ch] = {geojson:gj, leaflet:lyr};
    loading(false);
    return layers[ch];
  }).catch(function(e){ loading(true,'Could not load '+CHNAME[ch]+' (need internet).'); setTimeout(function(){loading(false);},2500); throw e; });
}

function showChamber(ch){
  active = ch;
  Object.keys(layers).forEach(function(k){ if(layers[k].leaflet && map.hasLayer(layers[k].leaflet)) map.removeLayer(layers[k].leaflet); });
  Array.prototype.forEach.call(document.querySelectorAll('#chambers button'), function(b){ b.classList.toggle('active', b.dataset.ch===ch); });
  fetchLayer(ch).then(function(o){ o.leaflet.addTo(map); renderLegend(); });
}

function findLeafletLayer(ch, d){
  var o = layers[ch]; if(!o) return null; var found=null;
  o.leaflet.eachLayer(function(l){ if(l.feature && l.feature.__d===String(d)) found=l; });
  return found;
}

function selectDistrict(ch, d, fly){
  if(active!==ch){ // switch chamber first, then select once its layer is ready
    active = ch;
    Object.keys(layers).forEach(function(k){ if(layers[k].leaflet && map.hasLayer(layers[k].leaflet)) map.removeLayer(layers[k].leaflet); });
    Array.prototype.forEach.call(document.querySelectorAll('#chambers button'), function(b){ b.classList.toggle('active', b.dataset.ch===ch); });
    fetchLayer(ch).then(function(o){ o.leaflet.addTo(map); renderLegend(); selectDistrict(ch,d,fly); });
    return;
  }
  d = String(d);
  // reset previous
  if(selected){ var pl=findLeafletLayer(selected.ch, selected.d); if(pl) pl.setStyle(styleFor(selected.ch, selected.d)); }
  var ll = findLeafletLayer(ch, d);
  if(ll){
    ll.setStyle({color:'var(--sel)', weight:3.2, fillOpacity:.55});
    if(ll.bringToFront) ll.bringToFront();
    if(fly){ try{ map.fitBounds(ll.getBounds(), {padding:[40,40], maxZoom:11}); }catch(e){} }
  }
  selected = {ch:ch, d:d};
  renderInfo(ch, d);
}

function renderInfo(ch, d){
  var m = memberOf(ch, d);
  var pcls = m && m.party ? m.party : 'X';
  var pill = (ch==='C' && m && m.party) ? '<span class="pill '+pcls+'">'+(m.party==='R'?'Republican':(m.party==='D'?'Democrat':m.party))+'</span>' : '';
  var html = '<h2>'+CHNAME[ch]+'</h2>'+
    '<p class="dnum">'+CHPREFIX[ch]+'-'+d+'</p>'+
    (m ? '<p class="mname">'+fullName(m)+'</p>'+pill
       : '<p class="mname" style="color:var(--muted)">No current member on file</p>')+
    '<p class="contact" style="margin-top:12px">'+
      '<a href="https://wrm.capitol.texas.gov/home" target="_blank" rel="noopener">Official contact & details ↗</a></p>';
  document.getElementById('info').innerHTML = html;
}

function renderLegend(){
  var el = document.getElementById('legend');
  if(active==='C'){
    el.innerHTML = '<h2>Legend — '+CHNAME[active]+'</h2>'+
      '<div class="lrow"><span class="sw" style="background:var(--dem)"></span>Democratic-held seat</div>'+
      '<div class="lrow"><span class="sw" style="background:var(--rep)"></span>Republican-held seat</div>'+
      '<div class="lrow"><span class="sw" style="background:#94a3b8"></span>No incumbent / vacant</div>'+
      '<p class="hint" style="margin:8px 0 0">Congressional boundaries: <b>Plan C2333</b>, in effect for the 2026 elections.</p>';
  } else {
    el.innerHTML = '<h2>Legend — '+CHNAME[active]+'</h2>'+
      '<div class="lrow"><span class="sw" style="background:'+CHCOLOR[active]+'"></span>'+CHNAME[active]+' district</div>'+
      '<p class="hint" style="margin:8px 0 0">Boundaries: current enacted plan (2023–2026).</p>';
  }
}

// ---- cities ----
var cities = []; // {name, lat, lon}
var citiesReady = null;
function loadCities(){
  if(citiesReady) return citiesReady;
  loading(true,'Loading Texas cities…');
  citiesReady = Promise.all([fetch(CITY_EP(4)).then(function(r){return r.json();}), fetch(CITY_EP(5)).then(function(r){return r.json();})])
    .then(function(res){
      var seen={};
      [res[0],res[1]].forEach(function(j){ (j.features||[]).forEach(function(f){
        var a=f.attributes; var nm=a.BASENAME; if(!nm||seen[nm.toLowerCase()]) return; seen[nm.toLowerCase()]=1;
        cities.push({name:nm, lat:parseFloat(a.CENTLAT), lon:parseFloat(a.CENTLON)});
      });});
      cities.sort(function(a,b){return a.name.localeCompare(b.name);});
      loading(false); return cities;
    }).catch(function(e){ loading(false); return cities; });
  return citiesReady;
}

// point in polygon (lng,lat) against GeoJSON geometry
function pipRing(x,y,ring){var c=false;for(var i=0,j=ring.length-1;i<ring.length;j=i++){var xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi))c=!c;}return c;}
function pipGeom(x,y,g){
  if(!g) return false;
  if(g.type==='Polygon'){ if(!pipRing(x,y,g.coordinates[0])) return false; for(var k=1;k<g.coordinates.length;k++){ if(pipRing(x,y,g.coordinates[k])) return false; } return true; }
  if(g.type==='MultiPolygon'){ for(var p=0;p<g.coordinates.length;p++){ var poly=g.coordinates[p]; if(pipRing(x,y,poly[0])){ var hole=false; for(var h=1;h<poly.length;h++){ if(pipRing(x,y,poly[h])){hole=true;break;} } if(!hole) return true; } } return false; }
  return false;
}
function districtAt(ch, lon, lat){
  var o=layers[ch]; if(!o) return null; var hit=null;
  (o.geojson.features||[]).forEach(function(f){ if(hit===null && pipGeom(lon,lat,f.geometry)) hit=distOf(f,ch); });
  return hit;
}

function cityLookup(city){
  // ensure all three layers loaded
  return Promise.all([fetchLayer('C'),fetchLayer('H'),fetchLayer('S')]).then(function(){
    var res = {C:districtAt('C',city.lon,city.lat), H:districtAt('H',city.lon,city.lat), S:districtAt('S',city.lon,city.lat)};
    // marker
    if(window.__cityMarker) map.removeLayer(window.__cityMarker);
    window.__cityMarker = L.marker([city.lat,city.lon]).addTo(map).bindPopup('<b>'+city.name+'</b>').openPopup();
    map.setView([city.lat,city.lon], 10);
    renderCityInfo(city, res);
  });
}

function memLine(ch,d){ if(d==null) return '<span style="color:var(--muted)">—</span>'; var m=memberOf(ch,d); var pp = (ch==='C'&&m&&m.party)?' ('+m.party+')':''; return '<b>'+CHPREFIX[ch]+'-'+d+'</b> · '+(m?fullName(m)+pp:'(no member)'); }
function renderCityInfo(city, res){
  var html = '<h2>City → Districts</h2><p class="dnum" style="font-size:18px">'+city.name+', TX</p>'+
    '<div style="margin-top:8px">'+
      '<div class="cityrow"><span>U.S. Congress</span><span>'+memLine('C',res.C)+'</span></div>'+
      '<div class="cityrow"><span>State House</span><span>'+memLine('H',res.H)+'</span></div>'+
      '<div class="cityrow"><span>State Senate</span><span>'+memLine('S',res.S)+'</span></div>'+
    '</div>'+
    '<p class="hint" style="margin-top:10px">Based on the city center point. Large cities span multiple districts — click the map at a specific spot for that location’s district.</p>';
  document.getElementById('info').innerHTML = html;
}

// map click anywhere -> district in active chamber + (if loaded) others
map.on('click', function(e){
  var lon=e.latlng.lng, lat=e.latlng.lat;
  var d = districtAt(active, lon, lat);
  if(d!=null) selectDistrict(active, d, false);
});

// ---- search / autocomplete ----
var searchEl = document.getElementById('search'), dropEl = document.getElementById('drop');
function parseDistrict(q){
  var m;
  if((m=q.match(/^\s*(?:hd|house)\s*#?\s*(\d{1,3})\s*$/i))) return {ch:'H', d:String(+m[1])};
  if((m=q.match(/^\s*(?:sd|senate)\s*#?\s*(\d{1,2})\s*$/i))) return {ch:'S', d:String(+m[1])};
  if((m=q.match(/^\s*(?:cd|congress(?:ional)?|us\s*house)\s*#?\s*(\d{1,2})\s*$/i))) return {ch:'C', d:String(+m[1])};
  return null;
}
function nameMatches(q){
  q=q.toLowerCase(); var out=[];
  ['C','H','S'].forEach(function(ch){ var R=ROSTER[ch]||{}; Object.keys(R).forEach(function(d){ var m=R[d]; var f=(m[0]||'').toLowerCase(), l=(m[1]||'').toLowerCase(); if((f+' '+l).indexOf(q)>=0 || l.indexOf(q)>=0){ out.push({ch:ch,d:d,m:m}); } }); });
  return out.slice(0,30);
}
function cityMatches(q){
  q=q.toLowerCase(); if(!cities.length) return [];
  var pre=[], inc=[];
  for(var i=0;i<cities.length;i++){ var n=cities[i].name.toLowerCase(); if(n.indexOf(q)===0) pre.push(cities[i]); else if(n.indexOf(q)>=0) inc.push(cities[i]); if(pre.length>=12)break; }
  return pre.concat(inc).slice(0,12);
}
function badge(ch){ return '<span class="badge" style="background:'+CHCOLOR[ch]+'">'+CHPREFIX[ch]+'</span>'; }

function renderDrop(q){
  if(!q || q.length<1){ dropEl.style.display='none'; return; }
  var html=''; var pd=parseDistrict(q);
  if(pd){ var m=memberOf(pd.ch,pd.d); html+='<div class="grp">District</div><div class="opt" data-act="dist" data-ch="'+pd.ch+'" data-d="'+pd.d+'">'+badge(pd.ch)+'<span>'+CHPREFIX[pd.ch]+'-'+pd.d+' — '+(m?fullName(m):'(no member)')+'</span></div>'; }
  var nm=nameMatches(q);
  if(nm.length){ html+='<div class="grp">Legislators</div>'; nm.forEach(function(o){ var pp=(o.ch==='C'&&o.m[2])?' ('+o.m[2]+')':''; html+='<div class="opt" data-act="dist" data-ch="'+o.ch+'" data-d="'+o.d+'">'+badge(o.ch)+'<span>'+o.m[0]+' '+o.m[1]+pp+' · '+CHPREFIX[o.ch]+'-'+o.d+'</span></div>'; }); }
  var cm=cityMatches(q);
  if(cm.length){ html+='<div class="grp">Cities</div>'; cm.forEach(function(c){ html+='<div class="opt" data-act="city" data-name="'+c.name.replace(/"/g,'&quot;')+'"><span style="color:var(--muted)">📍</span><span>'+c.name+', TX</span></div>'; }); }
  if(!html){ html='<div class="opt" style="color:var(--muted)">No matches</div>'; }
  dropEl.innerHTML=html; dropEl.style.display='block';
}
dropEl.addEventListener('click', function(e){
  var opt=e.target.closest('.opt'); if(!opt) return;
  if(opt.dataset.act==='dist'){ selectDistrict(opt.dataset.ch, opt.dataset.d, true); }
  else if(opt.dataset.act==='city'){ var nm=opt.dataset.name; var c=cities.filter(function(x){return x.name===nm;})[0]; if(c) cityLookup(c); }
  dropEl.style.display='none'; searchEl.value='';
});
var debTimer=null;
searchEl.addEventListener('input', function(){ var q=searchEl.value.trim(); clearTimeout(debTimer); debTimer=setTimeout(function(){ renderDrop(q); },110); });
searchEl.addEventListener('focus', loadCities);
document.addEventListener('click', function(e){ if(!e.target.closest('.searchwrap')) dropEl.style.display='none'; });

// chamber buttons
document.getElementById('chambers').addEventListener('click', function(e){ var b=e.target.closest('button'); if(b) showChamber(b.dataset.ch); });

// foot
document.getElementById('foot').innerHTML = 'Boundaries & members: Texas Legislative Council (giswebe.tlc.texas.gov, wrm.capitol.texas.gov) and U.S. Census TIGERweb. Congressional map = Plan C2333 (2026). Loads live data — needs an internet connection.';

// init
showChamber('C');
loadCities();
})();
</script>
</body>
</html>
